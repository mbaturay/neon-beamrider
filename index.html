<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Beamrider</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #game-canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        touch-action: none;
      }

      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        font-family: "Courier New", monospace;
        color: #0ff;
      }

      #hud .hud-top {
        display: flex;
        justify-content: space-between;
        padding: 16px 24px;
        font-size: 18px;
        text-shadow: 0 0 8px #0ff;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <div class="hud-top">
        <span id="hud-score">SCORE: 0</span>
        <span id="hud-speed">SPEED: 0</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
