<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Beamrider</title>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="hud">
      <!-- Top bar: score/combo left, speed/theme right -->
      <div class="hud-top">
        <div class="hud-top-left">
          <span class="hud-score" id="hud-score">SCORE: 0</span>
          <span class="hud-multiplier" id="hud-multiplier">x1</span>
          <div class="hud-combo-bar">
            <div class="hud-combo-fill" id="hud-combo-fill"></div>
          </div>
        </div>
        <div class="hud-top-right">
          <span class="hud-speed" id="hud-speed">SPD 1.0</span>
          <span class="hud-theme" id="hud-theme">NEON</span>
        </div>
      </div>

      <!-- Game-over overlay (hidden until GameOver phase) -->
      <div class="hud-gameover" id="hud-gameover">
        <div class="hud-gameover-title">GAME OVER</div>
        <div class="hud-gameover-score" id="hud-gameover-score">0</div>
        <div class="hud-gameover-prompt">PRESS R TO RESTART</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
